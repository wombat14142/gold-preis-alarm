name: Gold Price Check

on:
  schedule:
    - cron: '0 * * * *'  # Jede Stunde
  workflow_dispatch:
    inputs:
      test:
        description: 'Testnachricht senden?'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Goldpreis prüfen
        run: python check_gold.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TLEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TLEGRAM_CHAT_ID_2 }}
          FORCE_TEST: ${{ inputs.test }}
